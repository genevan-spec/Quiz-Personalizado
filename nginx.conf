server {
    listen       80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Health check (usado por Podman e load balancers) ──────────────────
    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # ── Proxy da API para o backend Fastify ───────────────────────────────
    location /api {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── SPA routing — serve index.html para todas as rotas React ──────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache agressivo para assets estáticos com hash no nome ────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Segurança básica ──────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;

    # Esconder versão do Nginx
    server_tokens off;
}
